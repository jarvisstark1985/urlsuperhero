<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URLSuperHero Dashboard</title>
    <link rel="canonical" href="https://urlsuperhero.com/dashboard.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P2C3KN7T');</script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            color: #E0E0E0;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0A0A0A;
            padding: 20px;
        }

        .login-box {
            background-color: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .login-box h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #FFFFFF;
        }

        .login-box .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #E0E0E0;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0A0A0A;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .error-message {
            display: none;
            background-color: rgba(255, 107, 53, 0.1);
            border: 1px solid #FF6B35;
            color: #FF6B35;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .error-message.show {
            display: block;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #FF6B35;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-button:hover {
            background-color: #FF5A1F;
        }

        .login-button:active {
            background-color: #FF4800;
        }

        /* Dashboard Styles */
        .dashboard-container {
            display: none;
            background-color: #0A0A0A;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container.show {
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dashboard-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .logout-button {
            padding: 10px 20px;
            background-color: #FF6B35;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-button:hover {
            background-color: #FF5A1F;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .network-card {
            background-color: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .network-card:hover {
            border-color: #FF6B35;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.15);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .card-link {
            color: #FF6B35;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
            align-self: flex-start;
        }

        .card-link:hover {
            color: #FF5A1F;
        }

        .cta-section {
            background-color: #141414;
            border: 2px solid #FF6B35;
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .cta-title {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 10px;
        }

        .cta-subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .cta-button {
            padding: 14px 30px;
            background-color: #FF6B35;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            display: inline-block;
        }

        .cta-button:hover {
            background-color: #FF5A1F;
        }

        .email-lookup-section {
            background-color: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .lookup-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lookup-form input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            background-color: #0A0A0A;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #E0E0E0;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .lookup-form input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .lookup-button {
            padding: 12px 24px;
            background-color: #FF6B35;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .lookup-button:hover {
            background-color: #FF5A1F;
        }

        .lookup-result {
            background-color: #0A0A0A;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }

        .lookup-result.show {
            display: block;
        }

        .lookup-result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .lookup-result-label {
            color: #999;
            font-weight: 500;
        }

        .lookup-result-value {
            color: #E0E0E0;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            border: 2px solid #2A2A2A;
            border-top: 2px solid #FF6B35;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .dashboard-header h1 {
                font-size: 24px;
            }

            .network-grid {
                grid-template-columns: 1fr;
            }

            .lookup-form {
                flex-direction: column;
            }

            .lookup-form input {
                min-width: 100%;
            }

            .cta-section {
                padding: 25px;
            }

            .cta-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P2C3KN7T"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>ð URLSuperHero</h1>
            <p class="subtitle">Client Dashboard</p>
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-button">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div class="dashboard-container" id="dashboardContainer">
        <div class="dashboard-header">
            <div>
                <h1>ð SuperHero Network</h1>
                <p style="color: #999; margin-top: 5px;">AI Domain Marketplace</p>
            </div>
            <button class="logout-button" onclick="handleLogout()">Logout</button>
        </div>

        <!-- CTA Section -->
        <div class="cta-section">
            <div class="cta-title">Find Your Perfect Domain</div>
            <p class="cta-subtitle">Browse AI-powered domain names and connect with the SuperHero Network</p>
            <button class="cta-button" onclick="scrollToSignup()">Get Started â</button>
        </div>

        <!-- Network Overview Section -->
        <h2 class="section-title">Explore the SuperHero Network</h2>
        <div class="network-grid" id="networkGrid"></div>

        <!-- Email Lookup Section -->
        <h2 class="section-title">Search for an Existing Lead</h2>
        <div class="email-lookup-section">
            <div class="lookup-form">
                <input type="email" id="lookupEmail" placeholder="Enter email address..." required>
                <button class="lookup-button" onclick="searchLead()">Search</button>
            </div>
            <div class="lookup-result" id="lookupResult"></div>
        </div>

        <!-- Signup/Capture Section -->
        <h2 class="section-title" id="signupSection">Register Your Interest</h2>
        <div class="email-lookup-section">
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Your full name" required style="padding: 12px; background-color: #0A0A0A; border: 1px solid #2A2A2A; border-radius: 6px; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 14px; width: 100%; margin-bottom: 15px;">
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required style="padding: 12px; background-color: #0A0A0A; border: 1px solid #2A2A2A; border-radius: 6px; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 14px; width: 100%; margin-bottom: 15px;">
                </div>
                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" placeholder="+1 (555) 000-0000" style="padding: 12px; background-color: #0A0A0A; border: 1px solid #2A2A2A; border-radius: 6px; color: #E0E0E0; font-family: 'Inter', sans-serif; font-size: 14px; width: 100%; margin-bottom: 15px;">
                </div>
                <button type="submit" class="cta-button" style="width: 100%;">Submit â</button>
            </form>
            <div id="signupMessage" style="margin-top: 15px; text-align: center; display: none; padding: 15px; border-radius: 6px;"></div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://super-hero-api.replit.app/api/leads';
        const VALID_USERNAME = 'Jarvis.Stark1985';
        const VALID_PASSWORD = 'Superhero2026$';

        const SITES = [
            { name: 'TheAISuperHeroes.com', url: 'https://theaisuperheroes.com', icon: 'ð¤' },
            { name: 'ResumeSuperHero.com', url: 'https://resumesuperhero.com', icon: 'ð' },
            { name: 'ShopifySuperHero.com', url: 'https://shopifysuperhero.com', icon: 'ðï¸' },
            { name: 'SEOAISuperHero.com', url: 'https://seoaisuperhero.com', icon: 'ð' },
            { name: 'MCPSuperHero.com', url: 'https://mcpsuperhero.com', icon: 'âï¸' },
            { name: 'ReplitSuperHero.com', url: 'https://replitsuperhero.com', icon: 'ð»' },
            { name: 'ClaudSuperHero.com', url: 'https://claudsuperhero.com', icon: 'ð§ ' },
            { name: 'AgenticSuperHero.com', url: 'https://agenticsuperhero.com', icon: 'ð¯' },
            { name: 'URLSuperHero.com', url: 'https://urlsuperhero.com', icon: 'ð' },
            { name: 'StartBizSuperHero.com', url: 'https://startbizsuperhero.com', icon: 'ð' }
        ];

        let allLeads = [];

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                errorMessage.classList.remove('show');
                localStorage.setItem('dashboardLoggedIn', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').classList.add('show');
                loadDashboardData();
                renderNetworkOverview();
            } else {
                errorMessage.textContent = 'Invalid username or password';
                errorMessage.classList.add('show');
                document.getElementById('password').value = '';
            }
        }

        function handleLogout() {
            localStorage.removeItem('dashboardLoggedIn');
            document.getElementById('dashboardContainer').classList.remove('show');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('loginForm').reset();
            document.getElementById('errorMessage').classList.remove('show');
        }

        async function loadDashboardData() {
            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error('Failed to fetch leads');
                allLeads = await response.json();
            } catch (error) {
                console.error('Error loading leads:', error);
            }
        }

        function renderNetworkOverview() {
            const grid = document.getElementById('networkGrid');
            grid.innerHTML = SITES.map(site => `
                <div class="network-card">
                    <div>
                        <div class="card-icon">${site.icon}</div>
                        <div class="card-title">${site.name}</div>
                        <div class="card-subtitle">Part of SuperHero Network</div>
                    </div>
                    <a href="${site.url}" target="_blank" class="card-link">Visit Site â</a>
                </div>
            `).join('');
        }

        async function searchLead() {
            const email = document.getElementById('lookupEmail').value.trim();
            const resultDiv = document.getElementById('lookupResult');

            if (!email) {
                resultDiv.textContent = 'Please enter an email address';
                resultDiv.classList.add('show');
                return;
            }

            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
            resultDiv.classList.add('show');

            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error('Failed to fetch leads');

                const leads = await response.json();
                const found = leads.find(lead => lead.email && lead.email.toLowerCase() === email.toLowerCase());

                if (found) {
                    resultDiv.innerHTML = `
                        <div class="lookup-result-item">
                            <span class="lookup-result-label">Name:</span>
                            <span class="lookup-result-value">${found.name || 'N/A'}</span>
                        </div>
                        <div class="lookup-result-item">
                            <span class="lookup-result-label">Email:</span>
                            <span class="lookup-result-value">${found.email}</span>
                        </div>
                        <div class="lookup-result-item">
                            <span class="lookup-result-label">Phone:</span>
                            <span class="lookup-result-value">${found.phone || 'N/A'}</span>
                        </div>
                        <div class="lookup-result-item">
                            <span class="lookup-result-label">Joined:</span>
                            <span class="lookup-result-value">${new Date(found.createdAt).toLocaleDateString()}</span>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div style="color: #999; padding: 15px; text-align: center;">No lead found with this email address. Register below!</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: #FF6B35;">Error searching leads: ${error.message}</div>`;
            }
        }

        async function handleSignup(e) {
            e.preventDefault();

            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('signupPhone').value.trim();
            const messageDiv = document.getElementById('signupMessage');

            if (!name || !email) {
                messageDiv.textContent = 'Please fill in all required fields';
                messageDiv.style.display = 'block';
                messageDiv.style.backgroundColor = 'rgba(255, 107, 53, 0.1)';
                messageDiv.style.color = '#FF6B35';
                messageDiv.style.borderLeft = '4px solid #FF6B35';
                return;
            }

            messageDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Submitting...</div>';
            messageDiv.style.display = 'block';

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        phone: phone || null
                    })
                });

                if (!response.ok) throw new Error('Failed to submit lead');

                const result = await response.json();
                messageDiv.innerHTML = 'â Thank you! Your information has been submitted. Welcome to the SuperHero Network!';
                messageDiv.style.backgroundColor = 'rgba(107, 255, 53, 0.1)';
                messageDiv.style.color = '#6BFF35';
                messageDiv.style.borderLeft = '4px solid #6BFF35';

                document.getElementById('signupForm').reset();

                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            } catch (error) {
                messageDiv.textContent = `Error: ${error.message}`;
                messageDiv.style.backgroundColor = 'rgba(255, 107, 53, 0.1)';
                messageDiv.style.color = '#FF6B35';
                messageDiv.style.borderLeft = '4px solid #FF6B35';
            }
        }

        function scrollToSignup() {
            document.getElementById('signupSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('dashboardLoggedIn') === 'true') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').classList.add('show');
                loadDashboardData();
                renderNetworkOverview();
            }
        });

        // Allow Enter to submit search
        document.getElementById('lookupEmail')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLead();
        });
    </script>
</body>
</html>
